name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: researion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Ruff lint
        run: ruff check backend/app backend/tests
        working-directory: .

      - name: Run backend tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/researion_test
          REDIS_URL: redis://localhost:6379/0
          AUTH_MODE: jwt
          SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
          SEARCH_PROVIDER: mock
          BACKEND_CORS_ORIGINS: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Frontend production build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000/api
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose configs
        env:
          POSTGRES_PASSWORD: ci-validate-only
          VITE_API_URL: http://localhost:8000/api
        run: |
          cp backend/.env.production.example backend/.env.production
          docker compose -f docker-compose.yml config > /dev/null
          docker compose -f docker-compose.prod.yml config > /dev/null
