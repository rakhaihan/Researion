services:

  db:

    image: postgres:16-alpine

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: researion

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U postgres"]

      interval: 5s

      timeout: 5s

      retries: 10



  redis:

    image: redis:7-alpine

    ports:

      - "6379:6379"

    volumes:

      - redis_data:/data

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 5s

      retries: 10



  backend:

    build:

      context: ./backend

    ports:

      - "8000:8000"

    env_file:

      - ./backend/.env.example

    environment:

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/researion

      REDIS_URL: redis://redis:6379/0

      SEARCH_PROVIDER: mock

      TAVILY_MAX_RESULTS: 5

      ALLOW_SEARCH_FALLBACK: "true"

    depends_on:

      db:

        condition: service_healthy

      redis:

        condition: service_healthy

    restart: unless-stopped



  worker:

    build:

      context: ./backend

    command: arq app.workers.settings.WorkerSettings

    env_file:

      - ./backend/.env.example

    environment:

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/researion

      REDIS_URL: redis://redis:6379/0

      SEARCH_PROVIDER: mock

      TAVILY_MAX_RESULTS: 5

      ALLOW_SEARCH_FALLBACK: "true"

    depends_on:

      db:

        condition: service_healthy

      redis:

        condition: service_healthy

    restart: unless-stopped



  frontend:

    build:

      context: ./frontend

      args:

        VITE_API_URL: http://localhost:8000/api

    ports:

      - "5173:80"

    depends_on:

      - backend

      - worker

    restart: unless-stopped



volumes:

  postgres_data:

  redis_data:

